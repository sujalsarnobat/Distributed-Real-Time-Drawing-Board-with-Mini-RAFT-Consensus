
networks:
  raft-net:
    driver: bridge

services:

  # ── Frontend ──────────────────────────────────────────────────────────────
  frontend:
    build: ./frontend
    ports:
      - "8080:8080"
    networks:
      - raft-net
    depends_on:
      - gateway

  # ── Gateway ───────────────────────────────────────────────────────────────
  gateway:
    build: ./gateway
    ports:
      - "3000:3000"
    environment:
      - REPLICAS=replica1:4001,replica2:4002,replica3:4003
    networks:
      - raft-net
    depends_on:
      - replica1
      - replica2
      - replica3

  # ── Replica 1 ─────────────────────────────────────────────────────────────
  replica1:
    build: ./replica1
    expose:
      - "4001"
    volumes:
      - ./replica1:/app          # Bind mount for hot-reload
      - /app/node_modules        # Preserve node_modules inside container
    environment:
      - REPLICA_ID=replica1
      - PORT=4001
      - PEERS=replica2:4002,replica3:4003
      - GATEWAY_URL=http://gateway:3000
    networks:
      - raft-net

  # ── Replica 2 ─────────────────────────────────────────────────────────────
  replica2:
    build: ./replica2
    expose:
      - "4002"
    volumes:
      - ./replica2:/app
      - /app/node_modules
    environment:
      - REPLICA_ID=replica2
      - PORT=4002
      - PEERS=replica1:4001,replica3:4003
      - GATEWAY_URL=http://gateway:3000
    networks:
      - raft-net

  # ── Replica 3 ─────────────────────────────────────────────────────────────
  replica3:
    build: ./replica3
    expose:
      - "4003"
    volumes:
      - ./replica3:/app
      - /app/node_modules
    environment:
      - REPLICA_ID=replica3
      - PORT=4003
      - PEERS=replica1:4001,replica2:4002
      - GATEWAY_URL=http://gateway:3000
    networks:
      - raft-net
